# 公网部署：仅 MCP 经 Caddy 暴露 HTTPS，REST API 只在容器内网
# 用法见 DEPLOY-PUBLIC.md

services:
  rest-api:
    build: ./local-rest-api
    container_name: local-rest-api
    expose:
      - "3200"
    environment:
      PORT: "3200"
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in .env.public}
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3200/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  mcp-server:
    build: ./internal-api-mcp-server
    container_name: internal-api-mcp-server
    expose:
      - "3100"
    environment:
      INTERNAL_API_BASE_URL: http://rest-api:3200
      INTERNAL_API_TOKEN: ${API_TOKEN}
      PORT: "3100"
      MCP_PATH: /mcp
      MCP_ACCESS_TOKEN: ${MCP_ACCESS_TOKEN:?set MCP_ACCESS_TOKEN in .env.public}
    depends_on:
      rest-api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3100/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: mcp-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      MCP_DOMAIN: ${MCP_DOMAIN:?set MCP_DOMAIN e.g. mcp.example.com}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
